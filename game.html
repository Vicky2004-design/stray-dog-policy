<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最後的機會 - 遊蕩犬議題互動遊戲</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #000;
            color: #f5f5f5;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 背景圖片容器 */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: #000;
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            transform: scale(1.1);
        }

        .bg-image.active {
            opacity: 0.6;
            animation: kenBurns 20s linear infinite alternate;
        }

        @keyframes kenBurns {
            from { transform: scale(1.1) translate(0, 0); }
            to { transform: scale(1.2) translate(-2%, -2%); }
        }

        /* 疊加層效果 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            z-index: 0;
            pointer-events: none;
        }

        .game-container {
            width: 100%;
            max-width: 800px;
            z-index: 10;
            padding: 30px;
            position: relative;
        }

        .glass-panel {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #fff;
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        .mute-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 20px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .mute-btn:hover { color: #fff; }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #fff;
            width: 0%;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px #fff;
        }

        .scene {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.8s ease-out;
        }

        .scene.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .scene-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #fff;
        }

        .scene-description {
            font-size: 18px;
            line-height: 1.8;
            color: rgba(255,255,255,0.8);
            margin-bottom: 35px;
            min-height: 100px;
        }

        .choices {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .choice-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 20px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            text-align: left;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .choice-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.5);
            transform: translateX(5px);
        }

        .choice-label {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 結局專用樣式 */
        .ending-content { text-align: center; }
        .ending-title { font-size: 32px; margin-bottom: 20px; color: #fff; }
        .ending-text { font-size: 18px; line-height: 1.8; margin-bottom: 30px; }
        
        .stance-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
            text-align: left;
        }

        .stance-bar-bg {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 8px;
        }

        .stance-bar-fill {
            height: 100%;
            background: #fff;
            border-radius: 3px;
            width: 0%;
            transition: width 1.5s ease-out;
        }

        .btn-action {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-action:hover {
            background: #ccc;
            transform: scale(1.05);
        }

        /* 打字機效果光標 */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #fff;
            margin-left: 2px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* 啟動畫面 */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s;
        }
    </style>
</head>
<body>
    <!-- 音訊元素 -->
    <audio id="bgm" loop src="https://upload.wikimedia.org/wikipedia/commons/2/22/Rain_on_a_tin_roof.ogg"></audio>
    <audio id="sfx-click" src="https://upload.wikimedia.org/wikipedia/commons/3/34/Clickick_switch.ogg"></audio>
    <audio id="sfx-dog" src="https://upload.wikimedia.org/wikipedia/commons/b/b5/Dog_whining_1.ogg"></audio>

    <div id="start-overlay">
        <h1 style="margin-bottom: 30px; letter-spacing: 5px;">最後的機會</h1>
        <p style="margin-bottom: 30px; color: rgba(255,255,255,0.6); font-size: 18px;">探索遊蕩犬議題的複雜性</p>
        <button class="btn-action" onclick="startGame()">開始探索</button>
        <p style="margin-top: 20px; color: rgba(255,255,255,0.4); font-size: 14px;">建議開啟聲音以獲得最佳體驗</p>
    </div>

    <div class="bg-container">
        <div id="bg-impression" class="bg-image" style="background-image: url('assets/scene_impression.jpg')"></div>
        <div id="bg-start" class="bg-image" style="background-image: url('assets/scene_start.jpg')"></div>
        <div id="bg-gathering" class="bg-image" style="background-image: url('assets/scene_gathering.jpg')"></div>
        <div id="bg-ending-compassion" class="bg-image" style="background-image: url('assets/ending_compassion.jpg')"></div>
        <div id="bg-ending-system" class="bg-image" style="background-image: url('assets/ending_system.jpg')"></div>
    </div>
    <div class="overlay"></div>

    <div class="game-container">
        <div class="glass-panel">
            <div class="header">
                <div class="title">最後的機會</div>
                <div class="controls">
                    <button class="mute-btn" id="muteBtn" title="音量控制">♪</button>
                    <button class="mute-btn" onclick="location.reload()" title="重新開始">⟳</button>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <!-- 場景零：初始印象 -->
            <div class="scene active" id="scene-impression">
                <div class="scene-title">心中的印象</div>
                <div class="scene-description" id="desc-impression"></div>
                <div class="choices">
                    <button class="choice-btn" onclick="makeChoice('impression', 'victim')">
                        <span class="choice-label">人道關懷</span>
                        <span>無助的受害者：牠們是被人類社會遺忘的弱勢群體。</span>
                    </button>
                    <button class="choice-btn" onclick="makeChoice('impression', 'threat')">
                        <span class="choice-label">公共安全</span>
                        <span>社區的安全隱患：牠們的存在可能對居民生活造成威脅。</span>
                    </button>
                    <button class="choice-btn" onclick="makeChoice('impression', 'ecology')">
                        <span class="choice-label">生態平衡</span>
                        <span>生態系統的破壞者：牠們可能對本土野生動物造成衝擊。</span>
                    </button>
                    <button class="choice-btn" onclick="makeChoice('impression', 'system')">
                        <span class="choice-label">系統思維</span>
                        <span>被忽視的生命：這是人類管理體系失靈下的悲劇產物。</span>
                    </button>
                </div>
            </div>

            <!-- 場景一 -->
            <div class="scene" id="scene-start">
                <div class="scene-title">深夜街角</div>
                <div class="scene-description" id="desc-start"></div>
                <div class="choices">
                    <button class="choice-btn" onclick="makeChoice('start', 'compassion')">
                        <span class="choice-label">人道餵食</span>
                        <span>給予食物與水，不忍看牠挨餓。</span>
                    </button>
                    <button class="choice-btn" onclick="makeChoice('start', 'rational')">
                        <span class="choice-label">理性通報</span>
                        <span>聯繫相關單位，尋求專業體系介入。</span>
                    </button>
                    <button class="choice-btn" onclick="makeChoice('start', 'committed')">
                        <span class="choice-label">長期承諾</span>
                        <span>開始為牠尋找認養者或中途家庭。</span>
                    </button>
                </div>
            </div>

            <!-- 場景二 -->
            <div class="scene" id="scene-gathering">
                <div class="scene-title">街頭的群聚</div>
                <div class="scene-description" id="desc-gathering"></div>
                <div class="choices">
                    <button class="choice-btn" onclick="makeChoice('gathering', 'tnvr')">
                        <span class="choice-label">推動 TNVR</span>
                        <span>捕捉、結紮、疫苗、回放，控制數量。</span>
                    </button>
                    <button class="choice-btn" onclick="makeChoice('gathering', 'removal')">
                        <span class="choice-label">移除與收容</span>
                        <span>通報政府捕捉，優先確保公共安全。</span>
                    </button>
                    <button class="choice-btn" onclick="makeChoice('gathering', 'education')">
                        <span class="choice-label">社區教育</span>
                        <span>組織說明會，尋求人與犬共存的共識。</span>
                    </button>
                </div>
            </div>

            <!-- 結局 -->
            <div class="scene" id="scene-ending">
                <div class="ending-content">
                    <h2 class="ending-title" id="endingTitle"></h2>
                    <p class="ending-text" id="endingText"></p>
                    
                    <div class="stance-grid">
                        <div>
                            <span style="font-size: 14px; color: rgba(255,255,255,0.6);">人道關懷 (Compassion)</span>
                            <div class="stance-bar-bg"><div id="bar-compassion" class="stance-bar-fill"></div></div>
                        </div>
                        <div>
                            <span style="font-size: 14px; color: rgba(255,255,255,0.6);">公共安全 (Safety)</span>
                            <div class="stance-bar-bg"><div id="bar-safety" class="stance-bar-fill"></div></div>
                        </div>
                        <div>
                            <span style="font-size: 14px; color: rgba(255,255,255,0.6);">生態平衡 (Ecology)</span>
                            <div class="stance-bar-bg"><div id="bar-ecology" class="stance-bar-fill"></div></div>
                        </div>
                        <div>
                            <span style="font-size: 14px; color: rgba(255,255,255,0.6);">系統思維 (System)</span>
                            <div class="stance-bar-bg"><div id="bar-system" class="stance-bar-fill"></div></div>
                        </div>
                    </div>

                    <button class="btn-action" onclick="location.reload()">重新開始</button>
                    <button class="btn-action" style="background: transparent; border: 1px solid #fff; color: #fff; margin-left: 10px;" onclick="location.href='index.html'">返回研究首頁</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const scenes = {
            impression: {
                text: "在開始這段旅程之前，請先誠實地問自己：當你在街頭遇見一隻流浪犬時，你腦海中浮現的第一個念頭是什麼？這個初始的印象，往往決定了我們如何看待這個複雜的社會議題。",
                bg: "bg-impression"
            },
            start: {
                text: "夜幕低垂，街角的路燈投下昏黃的光影。一隻瘦弱的小狗蜷縮在冷硬的地上，牠的眼神中透著無助與渴望。牠看著你，彷彿在問：「你會幫我嗎？」",
                bg: "bg-start",
                audio: "sfx-dog"
            },
            gathering: {
                text: "隔天早晨，你發現街頭有更多流浪犬聚集在垃圾堆附近。牠們相互依靠，但也因為資源競爭而不時發生衝突。附近的居民開始抱怨，商家也表示擔憂。",
                bg: "bg-gathering"
            }
        };

        const endings = {
            compassion: {
                title: "短暫的溫暖，長期的困境",
                text: "你的持續餵食確實給了這些狗狗短暫的溫暖，但數量卻在不斷增加。最終，社區的不滿與衝突也隨之升級。你開始意識到，單純的感情無法解決結構性的問題。",
                bg: "bg-ending-compassion"
            },
            system: {
                title: "系統性的轉機",
                text: "經過多方的努力與溝通，社區逐漸建立起一套平衡的管理機制。TNVR、源頭管控與公眾教育並行，流浪犬數量開始穩定下降。改變是緩慢的，但方向是正確的。",
                bg: "bg-ending-system"
            },
            safety: {
                title: "冰冷的秩序",
                text: "通過移除與收容，街道確實變得「乾淨」了。但那些被帶走的生命去了哪裡？你開始反思，是否有更人道的方式來平衡公共安全與動物福利。",
                bg: "bg-ending-system"
            }
        };

        let stances = { compassion: 0, safety: 0, ecology: 0, system: 0 };
        let isMuted = false;

        function startGame() {
            document.getElementById('start-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-overlay').style.display = 'none';
                playBGM();
                changeScene('impression');
            }, 1000);
        }

        function playBGM() {
            const bgm = document.getElementById('bgm');
            bgm.volume = 0.3;
            bgm.play().catch(e => console.log("Autoplay prevented"));
        }

        function playSFX(id) {
            if (isMuted) return;
            const sfx = document.getElementById(id);
            sfx.currentTime = 0;
            sfx.volume = 0.5;
            sfx.play();
        }

        function typeWriter(elementId, text, speed = 50) {
            const element = document.getElementById(elementId);
            element.innerHTML = '';
            let i = 0;
            
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else {
                    element.innerHTML += '<span class="cursor"></span>';
                }
            }
            type();
        }

        function changeScene(sceneId) {
            // 切換背景
            document.querySelectorAll('.bg-image').forEach(img => img.classList.remove('active'));
            const sceneData = scenes[sceneId];
            document.getElementById(sceneData.bg).classList.add('active');

            // 切換面板
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.getElementById(`scene-${sceneId}`).classList.add('active');

            // 打字機效果
            typeWriter(`desc-${sceneId}`, sceneData.text);

            // 播放特定音效
            if (sceneData.audio) {
                setTimeout(() => playSFX(sceneData.audio), 1500);
            }

            // 更新進度
            const progressMap = { 'impression': 25, 'start': 50, 'gathering': 75 };
            document.getElementById('progressFill').style.width = `${progressMap[sceneId]}%`;
        }

        function makeChoice(currentScene, choice) {
            playSFX('sfx-click');

            // 立場邏輯
            if (currentScene === 'impression') {
                if (choice === 'victim') stances.compassion += 2;
                if (choice === 'threat') stances.safety += 2;
                if (choice === 'ecology') stances.ecology += 2;
                if (choice === 'system') stances.system += 2;
                setTimeout(() => changeScene('start'), 500);
            } else if (currentScene === 'start') {
                if (choice === 'compassion') stances.compassion += 3;
                if (choice === 'rational') { stances.system += 2; stances.safety += 1; }
                if (choice === 'committed') { stances.compassion += 1; stances.system += 2; }
                setTimeout(() => changeScene('gathering'), 500);
            } else if (currentScene === 'gathering') {
                if (choice === 'tnvr') { stances.system += 3; stances.ecology += 1; }
                if (choice === 'removal') stances.safety += 3;
                if (choice === 'education') { stances.system += 2; stances.compassion += 1; }
                setTimeout(() => showEnding(), 500);
            }
        }

        function showEnding() {
            const total = Object.values(stances).reduce((a, b) => a + b, 0);
            
            // 決定結局
            let ending;
            if (stances.compassion > stances.safety && stances.compassion > stances.system) {
                ending = endings.compassion;
            } else if (stances.safety > stances.system) {
                ending = endings.safety;
            } else {
                ending = endings.system;
            }

            // 切換背景與面板
            document.querySelectorAll('.bg-image').forEach(img => img.classList.remove('active'));
            document.getElementById(ending.bg).classList.add('active');

            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.getElementById('scene-ending').classList.add('active');

            document.getElementById('endingTitle').textContent = ending.title;
            document.getElementById('endingText').textContent = ending.text;

            // 顯示立場條 (以最高可能分母 8 為基準)
            setTimeout(() => {
                document.getElementById('bar-compassion').style.width = `${(stances.compassion / 8) * 100}%`;
                document.getElementById('bar-safety').style.width = `${(stances.safety / 8) * 100}%`;
                document.getElementById('bar-ecology').style.width = `${(stances.ecology / 8) * 100}%`;
                document.getElementById('bar-system').style.width = `${(stances.system / 8) * 100}%`;
            }, 500);

            document.getElementById('progressFill').style.width = `100%`;
        }

        // 靜音切換
        document.getElementById('muteBtn').addEventListener('click', function() {
            isMuted = !isMuted;
            const bgm = document.getElementById('bgm');
            bgm.muted = isMuted;
            this.textContent = isMuted ? '✕' : '♪';
        });
    </script>
</body>
</html>
