<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最後的機會 - 遊蕩犬議題互動遊戲</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 900px;
            background: rgba(26, 26, 26, 0.95);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        .btn-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #555;
            color: #f5f5f5;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-control:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #888;
        }

        .progress-container {
            margin-bottom: 25px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #888, #ccc);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(200, 200, 200, 0.5);
        }

        .scene {
            display: none;
            animation: fadeIn 0.6s ease-out;
        }

        .scene.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .scene-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #e8e8e8;
            animation: titleSlide 0.6s ease-out;
        }

        @keyframes titleSlide {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .scene-description {
            font-size: 16px;
            line-height: 1.8;
            color: #d0d0d0;
            margin-bottom: 25px;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        .emoji-large {
            font-size: 60px;
            margin: 20px 0;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .choices {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 25px;
        }

        .choice-btn {
            background: linear-gradient(135deg, rgba(100, 100, 100, 0.3), rgba(80, 80, 80, 0.3));
            border: 2px solid #555;
            color: #f5f5f5;
            padding: 18px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            text-align: left;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .choice-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .choice-btn:hover {
            background: linear-gradient(135deg, rgba(120, 120, 120, 0.4), rgba(100, 100, 100, 0.4));
            border-color: #888;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .choice-btn:hover::before {
            left: 100%;
        }

        .choice-label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #b0b0b0;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .choice-text {
            display: block;
            color: #f5f5f5;
        }

        .stance-meter {
            margin-top: 30px;
            padding: 20px;
            background: rgba(50, 50, 50, 0.5);
            border-left: 4px solid #888;
            border-radius: 6px;
            font-size: 14px;
            color: #c0c0c0;
            animation: fadeIn 0.8s ease-out 0.3s both;
        }

        .stance-label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #e0e0e0;
        }

        .ending-container {
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        .ending-title {
            font-size: 32px;
            font-weight: 700;
            margin: 20px 0;
            color: #e8e8e8;
        }

        .ending-text {
            font-size: 16px;
            line-height: 1.8;
            color: #d0d0d0;
            margin: 20px 0;
        }

        .stance-distribution {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 30px 0;
        }

        .stance-item {
            background: rgba(80, 80, 80, 0.3);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #888;
        }

        .stance-item-label {
            font-weight: 600;
            font-size: 14px;
            color: #b0b0b0;
            margin-bottom: 8px;
        }

        .stance-item-bar {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }

        .stance-item-fill {
            height: 100%;
            background: linear-gradient(90deg, #888, #ccc);
            transition: width 0.8s ease-out;
        }

        .btn-restart {
            background: linear-gradient(135deg, #555, #777);
            border: none;
            color: #f5f5f5;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .btn-restart:hover {
            background: linear-gradient(135deg, #666, #888);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .mute-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 20px;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .mute-btn:hover {
            color: #ccc;
        }

        .mute-btn.muted {
            color: #555;
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 25px;
            }

            .scene-title {
                font-size: 20px;
            }

            .stance-distribution {
                grid-template-columns: 1fr;
            }

            .emoji-large {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="title">最後的機會</div>
            <div class="controls">
                <button class="mute-btn" id="muteBtn" title="靜音">🔊</button>
                <button class="btn-control" onclick="history.back()">← 返回</button>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <!-- 開場 -->
        <div class="scene active" id="scene-start">
            <div class="scene-title">深夜街角</div>
            <div class="emoji-large">🌙</div>
            <div class="scene-description">
                夜幕低垂，街角的路燈投下昏黃的光影。一隻瘦弱的小狗蜷縮在冷硬的地上，牠的眼神中透著無助與渴望。牠看著你，彷彿在問：「你會幫我嗎？」
            </div>
            <div class="choices">
                <button class="choice-btn" onclick="makeChoice('start', 'compassion')">
                    <span class="choice-label">💝 感性救援</span>
                    <span class="choice-text">靠近牠，給予食物與溫暖，希望能緩解牠當下的痛苦。</span>
                </button>
                <button class="choice-btn" onclick="makeChoice('start', 'rational')">
                    <span class="choice-label">📞 理性通報</span>
                    <span class="choice-text">聯繫相關單位，希望由專業體系介入（可能導向收容或 TNVR）。</span>
                </button>
                <button class="choice-btn" onclick="makeChoice('start', 'cautious')">
                    <span class="choice-label">⚠️ 謹慎觀察</span>
                    <span class="choice-text">擔心造成環境問題或被咬，選擇保持距離與觀察。</span>
                </button>
                <button class="choice-btn" onclick="makeChoice('start', 'committed')">
                    <span class="choice-label">🤝 長期承諾</span>
                    <span class="choice-text">不只是餵食，而是開始尋找認養者或中途家庭。</span>
                </button>
            </div>
            <div class="stance-meter">
                <div class="stance-label">你的立場正在形成...</div>
                <div style="font-size: 13px; color: #999;">每一個選擇都反映了你對這個議題的價值觀。</div>
            </div>
        </div>

        <!-- 場景二：群聚 -->
        <div class="scene" id="scene-gathering">
            <div class="scene-title">街頭的群聚</div>
            <div class="emoji-large">🐕‍🦺🐕</div>
            <div class="scene-description">
                隔天早晨，你發現街頭有更多流浪犬聚集在垃圾堆附近。牠們相互依靠，但也因為資源競爭而不時發生衝突。附近的居民開始抱怨，商家也表示擔憂。
            </div>
            <div class="choices">
                <button class="choice-btn" onclick="makeChoice('gathering', 'expand-feeding')">
                    <span class="choice-label">🥘 擴大餵食</span>
                    <span class="choice-text">加入更多人一起餵食，希望能減少牠們的飢餓與衝突。</span>
                </button>
                <button class="choice-btn" onclick="makeChoice('gathering', 'tnvr')">
                    <span class="choice-label">🏥 推動 TNVR</span>
                    <span class="choice-text">與動保團體合作，進行捕捉、結紮、疫苗、回放計畫。</span>
                </button>
                <button class="choice-btn" onclick="makeChoice('gathering', 'removal')">
                    <span class="choice-label">🚚 移除與收容</span>
                    <span class="choice-text">通報政府進行捕捉與收容，以解決公共安全問題。</span>
                </button>
                <button class="choice-btn" onclick="makeChoice('gathering', 'education')">
                    <span class="choice-label">📚 社區教育</span>
                    <span class="choice-text">組織社區說明會，討論如何平衡動物福利與公共利益。</span>
                </button>
            </div>
            <div class="stance-meter">
                <div class="stance-label">你的選擇越來越清晰...</div>
            </div>
        </div>

        <!-- 結局 -->
        <div class="scene" id="scene-ending">
            <div class="ending-container">
                <div class="ending-title" id="endingTitle">你的故事</div>
                <div class="emoji-large" id="endingEmoji">🌟</div>
                <div class="ending-text" id="endingText"></div>

                <div style="margin-top: 30px; padding: 20px; background: rgba(80, 80, 80, 0.3); border-radius: 8px;">
                    <div style="font-weight: 600; margin-bottom: 15px; color: #e0e0e0;">你的立場分布</div>
                    <div class="stance-distribution">
                        <div class="stance-item">
                            <div class="stance-item-label">💝 人道關懷</div>
                            <div class="stance-item-bar">
                                <div class="stance-item-fill" id="fill-compassion" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="stance-item">
                            <div class="stance-item-label">🛡️ 公共安全</div>
                            <div class="stance-item-bar">
                                <div class="stance-item-fill" id="fill-safety" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="stance-item">
                            <div class="stance-item-label">🌿 生態保育</div>
                            <div class="stance-item-bar">
                                <div class="stance-item-fill" id="fill-ecology" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="stance-item">
                            <div class="stance-item-label">⚙️ 系統性解決</div>
                            <div class="stance-item-bar">
                                <div class="stance-item-fill" id="fill-system" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <button class="btn-restart" onclick="location.reload()">重新開始遊戲</button>
                <button class="btn-restart" style="background: linear-gradient(135deg, #666, #888); margin-left: 10px;" onclick="history.back()">返回主頁</button>
            </div>
        </div>
    </div>

    <script>
        const stances = {
            compassion: 0,
            safety: 0,
            ecology: 0,
            system: 0
        };

        const endings = {
            compassion_heavy: {
                title: '短暫的溫暖，長期的困境',
                emoji: '💔',
                text: '你的持續餵食確實給了這些狗狗短暫的溫暖，但數量卻在不斷增加。最終，社區的不滿與衝突也隨之升級。你開始意識到，單純的感情無法解決結構性的問題。'
            },
            safety_heavy: {
                title: '冰冷的秩序，被遺忘的生命',
                emoji: '❄️',
                text: '通過移除與收容，街道確實變得「乾淨」了。但那些被帶走的生命去了哪裡？你開始反思，是否有更人道的方式來平衡公共安全與動物福利。'
            },
            system_heavy: {
                title: '系統性的轉機',
                emoji: '🌱',
                text: '經過多方的努力與溝通，社區逐漸建立起一套平衡的管理機制。TNVR、源頭管控與公眾教育並行，流浪犬數量開始穩定下降，衝突也隨之減少。改變是緩慢的，但方向是正確的。'
            },
            balanced: {
                title: '複雜中的平衡',
                emoji: '⚖️',
                text: '你的選擇反映了對這個議題的深刻理解。沒有完美的答案，但透過不同立場的對話與協力，我們可以找到更好的解決方案。你已經成為這個改變的一部分。'
            }
        };

        function makeChoice(scene, choice) {
            // 更新立場計數
            const choiceStances = {
                compassion: { compassion: 2, system: 1 },
                rational: { system: 2, safety: 1 },
                cautious: { safety: 2, ecology: 1 },
                committed: { compassion: 1, system: 2 },
                'expand-feeding': { compassion: 2 },
                'tnvr': { system: 2, ecology: 1 },
                'removal': { safety: 2 },
                'education': { system: 2, compassion: 1 }
            };

            if (choiceStances[choice]) {
                Object.entries(choiceStances[choice]).forEach(([stance, points]) => {
                    stances[stance] += points;
                });
            }

            // 更新進度條
            updateProgress();

            // 場景轉換
            if (scene === 'start') {
                document.getElementById('scene-start').classList.remove('active');
                document.getElementById('scene-gathering').classList.add('active');
            } else if (scene === 'gathering') {
                document.getElementById('scene-gathering').classList.remove('active');
                showEnding();
            }
        }

        function updateProgress() {
            const totalScenes = 2;
            const currentScene = document.querySelector('.scene.active').id;
            let progress = 50;
            if (currentScene === 'scene-gathering') progress = 75;
            if (currentScene === 'scene-ending') progress = 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showEnding() {
            document.getElementById('scene-gathering').classList.remove('active');
            document.getElementById('scene-ending').classList.add('active');

            // 計算結局
            const total = Object.values(stances).reduce((a, b) => a + b, 0);
            const compassionPercent = (stances.compassion / total) * 100;
            const safetyPercent = (stances.safety / total) * 100;
            const ecologyPercent = (stances.ecology / total) * 100;
            const systemPercent = (stances.system / total) * 100;

            // 顯示立場分布
            document.getElementById('fill-compassion').style.width = compassionPercent + '%';
            document.getElementById('fill-safety').style.width = safetyPercent + '%';
            document.getElementById('fill-ecology').style.width = ecologyPercent + '%';
            document.getElementById('fill-system').style.width = systemPercent + '%';

            // 決定結局
            let ending;
            if (compassionPercent > 40) {
                ending = endings.compassion_heavy;
            } else if (safetyPercent > 40) {
                ending = endings.safety_heavy;
            } else if (systemPercent > 40) {
                ending = endings.system_heavy;
            } else {
                ending = endings.balanced;
            }

            document.getElementById('endingTitle').textContent = ending.title;
            document.getElementById('endingEmoji').textContent = ending.emoji;
            document.getElementById('endingText').textContent = ending.text;

            updateProgress();
        }

        // 靜音按鈕
        document.getElementById('muteBtn').addEventListener('click', function() {
            this.classList.toggle('muted');
            this.textContent = this.classList.contains('muted') ? '🔇' : '🔊';
        });

        // 初始化進度條
        updateProgress();
    </script>
</body>
</html>
